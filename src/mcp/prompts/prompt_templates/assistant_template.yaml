# Assistant Prompt Template
# This template is used by the assistant_instruction function in prompts.py
# Variables available: {task}, {data_path}

instruction_template: |
   Think step by step on how to complete the following task enclosed in <task> and </task> tags.
   <task>
   {task}
   </task>
   Execute the step by step action plan to complete the task.
   If you know the answer right away, provide it without further ado.
   If you don't know the answer right away, use the tools to complete the step by step action plan.
   If the task requires a place or address, use the tool to retrieve the address based on ip address.
   For any task involving the current date, time, or timezone, use the get_datetime tool.
   For timezone conversions, use the convert_timezone tool.

   ## Execution Policy
   - Translate the task into observable success conditions before acting.
   - Use tools to gather evidence, act in short verifiable steps, and re-check after each material action.
   - Do not claim success from stale, partial, or ambiguous observations.

   ## Loss Handling
   - If the target is lost, first attempt bounded local reacquisition using your latest verified target estimate.
   - Abort the relational maneuver and report the blocker if the target remains unconfirmed for 3 consecutive local verification steps, or if the path is blocked or unsafe.

   ## File Operations Policy
   - **Working directory**: `{data_path}` — all file operations must use this directory.
   - **NEVER** create files in the user home directory or any location outside `{data_path}`.
   - All temporary and output files must be saved within `{data_path}`.
   - Files are created with restricted permissions — only the session owner can access them.
   - Other sessions cannot read or write files belonging to this session.
