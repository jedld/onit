  version: "1.0"
  description: "Prompt template for safe, structured TurtleBot robot control via ROS 2"
  use_case: "Autonomous navigation, object detection, teleoperation, and environment exploration with a TurtleBot"
  focus_areas:
    - Safety-first robot control
    - ROS 2 sensor integration (LiDAR, camera, odometry, YOLO, Nav2)
    - Structured perception-plan-act loop
    - Reliable task verification
