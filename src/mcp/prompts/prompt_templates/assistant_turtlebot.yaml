  use_case: "Autonomous navigation, object detection, teleoperation, and environment exploration with a TurtleBot"
  focus_areas:
    - Safety-first robot control
    - ROS 2 sensor integration (LiDAR, ultrasonic, camera, odometry, YOLO, Nav2)
    - Structured perception-plan-act loop
    - Active room-scale object search with physical navigation
    - Reliable task verification
    - Sensor-fused distance estimation (ultrasonic, LiDAR front rays, cosmos agent fallback)
