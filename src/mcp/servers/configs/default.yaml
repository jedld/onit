servers:
  - name: PromptsMCPServer
    module: src.mcp.prompts.prompts
    description: "MCP server for prompt templates and instruction generation"
    enabled: true
    host : 0.0.0.0
    port : 18200
    path : /sse
    transport : 'sse'

  - name: ToolsMCPServer
    module: tasks.tools
    description: "MCP server for web search, bash commands, file I/O, and document operations"
    enabled: true
    host : 0.0.0.0
    port : 18201
    path : /sse
    transport : 'sse'

  - name: VLMToolsMCPServer
    module: src.mcp.vlm_web.tools
    description: "MCP server for vision-language model tools"
    enabled: true
    host : 0.0.0.0
    port : 18222
    path: /sse
    transport : 'sse'

  - name: EcoFlowMCPServer
    module: tasks.iot.ecoflow.mcp_server
    description: "EcoFlow PowerStream — local MQTT solar generation and power-flow data"
    enabled: false   # set to true after configuring env vars below
    host : 0.0.0.0
    port : 18215
    path : /sse
    transport : 'sse'
    options:
      # device_ip: "192.168.1.42"     # LAN IP of the PowerStream
      # device_sn: "HW51xxxxxxxxxxxx" # Serial number (also the MQTT username)
      # mqtt_password: ""             # Local MQTT password from EcoFlow app
      # mqtt_port: 1883
      # Alternatively set env vars: ECOFLOW_DEVICE_IP, ECOFLOW_DEVICE_SN,
      #   ECOFLOW_MQTT_PASS, ECOFLOW_MQTT_PORT
